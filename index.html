<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marvel Universe | Heroes Gallery</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://picsum.photos/id/1015/2000/1200') center/cover; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-8px) scale(1.03); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Navbar + Hero (same as before) -->
  <nav class="bg-black border-b border-red-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <span class="text-4xl font-bold text-red-600">MARVEL</span>
      <div class="flex gap-8">
        <a href="#" class="hover:text-red-500">Home</a>
        <a href="#characters" class="hover:text-red-500">Characters</a>
      </div>
      <a href="https://github.com/YOUR-USERNAME/marvel-characters-website" target="_blank" class="bg-red-600 px-5 py-2 rounded-full font-medium">GitHub</a>
    </div>
  </nav>

  <header class="hero-bg h-screen flex items-center justify-center text-center">
    <div>
      <h1 class="text-7xl font-bold">MARVEL UNIVERSE</h1>
      <p class="text-3xl text-red-400 mt-4">Share your thoughts on your favorite heroes</p>
    </div>
  </header>

  <section id="characters" class="max-w-7xl mx-auto px-6 py-16">
    <h2 class="text-5xl font-bold mb-12">Marvel Characters</h2>
    <div id="charactersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Cards loaded by JS -->
    </div>
  </section>

  <script>
    const BACKEND_URL = "https://marvel-backend-kz52.onrender.com";   // ← Change if your URL is different

    let characters = [];

    async function loadCharacters() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/characters`);
        characters = await res.json();
        renderCharacters(characters);
      } catch (e) {
        document.getElementById('charactersGrid').innerHTML = `<p class="text-red-500">Error loading characters</p>`;
      }
    }

    function renderCharacters(list) {
      const grid = document.getElementById('charactersGrid');
      grid.innerHTML = '';
      list.forEach(char => {
        const card = document.createElement('div');
        card.className = "bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-700";
        card.innerHTML = `
          <img src="${char.image || 'https://picsum.photos/id/1015/600/400'}" class="w-full h-64 object-cover">
          <div class="p-6">
            <h3 class="text-2xl font-bold text-red-500">${char.name}</h3>
            <p class="text-zinc-400">${char.alias || ''}</p>
            <p class="text-sm mt-2 text-zinc-300">${char.desc || ''}</p>

            <!-- Comment Form -->
            <div class="mt-6 pt-4 border-t border-zinc-700">
              <input id="name-${char.name}" type="text" placeholder="Your name (optional)" 
                     class="w-full bg-zinc-800 p-3 rounded-xl text-sm mb-3">
              <textarea id="comment-${char.name}" placeholder="Write your comment about ${char.name}..." 
                        class="w-full bg-zinc-800 p-3 rounded-xl h-24 text-sm"></textarea>
              <button onclick="submitComment('${char.name}')" 
                      class="mt-3 w-full bg-red-600 hover:bg-red-700 py-3 rounded-2xl font-medium">
                Post Comment
              </button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function submitComment(characterName) {
      const userName = document.getElementById(`name-${characterName}`).value.trim() || "Anonymous";
      const commentText = document.getElementById(`comment-${characterName}`).value.trim();

      if (!commentText) {
        alert("Please write a comment!");
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/api/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ characterName, userName, commentText })
        });

        const result = await response.json();
        if (result.success) {
          alert("✅ Comment posted successfully!");
          document.getElementById(`comment-${characterName}`).value = '';  // clear textarea
        } else {
          alert("Failed to post comment");
        }
      } catch (error) {
        alert("Error connecting to server");
        console.error(error);
      }
    }

    window.onload = loadCharacters;
  </script>
</body>
</html>
